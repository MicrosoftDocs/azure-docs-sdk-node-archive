  - name: 'prependListener<E>(string | symbol, (args: any[]) => void)'
    uid: >-
      azure-storage.export=.common.services.storageserviceclient.StorageServiceClient.prependListener
    package: azure-storage
    summary: >-
      Adds the `listener` function to the _beginning_ of the listeners array for
      the

      event named `eventName`. No checks are made to see if the `listener` has

      already been added. Multiple calls passing the same combination of
      `eventName`

      and `listener` will result in the `listener` being added, and called,
      multiple

      times.


      ```js

      server.prependListener('connection', (stream) => {
        console.log('someone connected!');
      });

      ```


      Returns a reference to the `EventEmitter`, so that calls can be chained.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function prependListener<E>(eventName: string | symbol, listener: (args:
        any[]) => void): StorageServiceClient
      parameters:
        - id: eventName
          type: string | symbol
          description: The name of the event.
        - id: listener
